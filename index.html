<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GT7 Network // Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050507; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background: rgba(20, 20, 25, 0.9); border: 1px solid #333; padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff3e3e; border: none; color: white; cursor: pointer; font-weight: bold; }
        #form-register { display: none; }
    </style>
</head>
<body>

    <h1>GT7 NETWORK // LOBBY HUB</h1>
    <div id="user-status">Ожидание авторизации...</div>

    <div id="auth-panel" class="panel">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="switchTab('login')" style="background: #ff3e3e;">Вход</button>
            <button onclick="switchTab('register')" style="background: #333;">Регистрация</button>
        </div>

        <form id="form-login" onsubmit="handleAuth(event, 'login')">
            <input type="text" id="l-psn" placeholder="PSN ID" required><br><br>
            <input type="password" id="l-pass" placeholder="Пароль" required><br><br>
            <button type="submit">АВТОРИЗОВАТЬСЯ</button>
        </form>

        <form id="form-register" onsubmit="handleAuth(event, 'register')">
            <input type="text" id="r-psn" placeholder="PSN ID" required><br><br>
            <input type="text" id="r-car" placeholder="Болид" required><br><br>
            <input type="password" id="r-pass" placeholder="Пароль" required><br><br>
            <button type="submit">СОЗДАТЬ ПРОФИЛЬ</button>
        </form>
    </div>

    <script>
        // !!! ВСТАВЬ СЮДА СВОИ ДАННЫЕ ИЗ SUPABASE !!!
        const SUPABASE_URL = 'https://fbcnnieqieyvzsfipckl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_8IgPV_lCbhc2E2s07k-NfQ_7oMEoHIC';
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function switchTab(mode) {
            document.getElementById('form-login').style.display = (mode === 'login') ? 'block' : 'none';
            document.getElementById('form-register').style.display = (mode === 'register') ? 'block' : 'none';
        }

        async function handleAuth(e, mode) {
            e.preventDefault();
            try {
                if (mode === 'login') {
                    const psn = document.getElementById('l-psn').value;
                    const pass = document.getElementById('l-pass').value;
                    const { data, error } = await db.from('gt7_accounts').select('*').eq('psn_id', psn).eq('password', pass);
                    if (error || !data.length) throw new Error("Неверный логин или пароль");
                    alert("Добро пожаловать, " + psn);
                } else {
                    const psn = document.getElementById('r-psn').value;
                    const car = document.getElementById('r-car').value;
                    const pass = document.getElementById('r-pass').value;
                    const { error } = await db.from('gt7_accounts').insert([{ psn_id: psn, car_model: car, password: pass }]);
                    if (error) throw error;
                    alert("Профиль создан! Теперь войдите.");
                }
            } catch (err) {
                alert("Ошибка: " + err.message);
                console.error(err);
            }
        }
    </script>
</body>
</html>
