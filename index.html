<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT7 Network // Lobby Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #131419;
            --accent-color: #ff3e3e;
            --text-main: #f5f5f7;
            --text-muted: #7e7e86;
            --border-color: #24252d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-style: italic;
        }

        .hub-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 900px) {
            .hub-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #1c1d24;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #cc3232;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Стиль карточки пилота */
        .driver-card {
            background: linear-gradient(135deg, #1a1c23 0%, #111216 100%);
            border-left: 4px solid #00e5ff;
        }

        .driver-card .status {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0, 229, 255, 0.1);
            color: #00e5ff;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Стили гоночной ленты */
        .lobbies-feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .lobby-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .lobby-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .track-name {
            font-weight: bold;
            font-size: 16px;
            color: #fff;
        }

        .lobby-time {
            color: var(--accent-color);
            font-size: 13px;
            font-weight: bold;
        }

        .lobby-body p {
            margin: 6px 0;
            font-size: 14px;
            color: #ccc;
        }

        .lobby-comment {
            background: #1c1d24;
            padding: 8px 12px;
            border-radius: 4px;
            font-style: italic;
            color: var(--text-muted) !important;
            margin-top: 10px !important;
        }

        .switch-auth {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .switch-auth span {
            color: var(--accent-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>GT7 Network // Lobby Hub</h1>
        <div id="user-status" style="font-size: 14px; color: var(--text-muted);">Сессия пилота активна</div>
    </header>

    <div class="hub-container">
        
        <div class="left-column" style="display: flex; flex-direction: column; gap: 25px;">
            
            <div id="auth-panel" class="panel">
                <h2 id="auth-title">Регистрация пилота</h2>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label for="psn-id">PSN ID</label>
                        <input type="text" id="psn-id" placeholder="Например: PRO_DRIVER" required>
                    </div>
                    <div class="form-group">
                        <label for="car-model">Основной болид</label>
                        <input type="text" id="car-model" placeholder="Porsche 911 GT3 R (992)" required>
                    </div>
                    <button type="submit" id="auth-btn">Создать профиль</button>
                </form>
                <div class="switch-auth" onclick="toggleAuthMode()">
                    Уже есть профиль? <span id="switch-text">Войти в хаб</span>
                </div>
            </div>

            <div id="profile-panel" class="panel driver-card" style="display: none;">
                <h2>Текущий пилот</h2>
                <div class="status">В Сети</div>
                <p style="margin: 15px 0 5px 0; font-size: 18px; font-weight: bold;" id="profile-psn"></p>
                <p style="margin: 0; font-size: 14px; color: var(--text-muted);" id="profile-car"></p>
                <button onclick="logout()" style="margin-top: 20px; background: #24252d; font-size: 12px; padding: 8px;">Выйти из хаба</button>
            </div>

            <div id="create-lobby-panel" class="panel">
                <h2>Открыть заезд</h2>
                <form id="lobby-form" onsubmit="createLobby(event)">
                    <div class="form-group">
                        <label for="lobby-track">Трасса заезда</label>
                        <select id="lobby-track">
                            <option value="Nürburgring Nordschleife">Nürburgring Nordschleife</option>
                            <option value="Spa-Francorchamps">Spa-Francorchamps</option>
                            <option value="Sarthe (Le Mans)">Circuit de la Sarthe</option>
                            <option value="Suzuka Circuit">Suzuka Circuit</option>
                            <option value="Tsukuba">Tsukuba Circuit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="lobby-car">Ограничения по авто / Класс</label>
                        <input type="text" id="lobby-car" placeholder="Gr.3 / Свободный выбор" required>
                    </div>
                    <div class="form-group">
                        <label for="lobby-comment">Комментарий к лобби</label>
                        <textarea id="lobby-comment" rows="3" placeholder="Чистая гонка, старт в 21:00, квалификация 10 мин..."></textarea>
                    </div>
                    <button type="submit">Опубликовать в сеть</button>
                </form>
            </div>

        </div>

        <div class="right-column panel">
            <h2>Текущие лобби в сети (Активны 6 часов)</h2>
            <div id="lobbies-container" class="lobbies-feed">
                </div>
        </div>

    </div>

    <script>
        // Настройки облачного подключения
        const SUPABASE_URL = 'https://fbcnnieqieyzsfipckl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_8IgPV_lCbhc2E2s07k-NfQ_7oMEoHIC';
        
        // Глобальный клиент базы данных (без повторного объявления const!)
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Переменные состояния авторизации
        let isLoginMode = false; 
        let currentPilot = JSON.parse(sessionStorage.getItem('active_pilot')) || null;

        // --- ЛОГИКА АВТОРИЗАЦИИ И ПРОФИЛЕЙ ---
        
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const switchTxt = document.getElementById('switch-text');
            const carGroup = document.getElementById('car-model').closest('.form-group');

            if (isLoginMode) {
                title.innerText = "Вход в хаб";
                btn.innerText = "Авторизоваться";
                switchTxt.innerText = "Создать профиль";
                carGroup.style.display = "none";
                document.getElementById('car-model').removeAttribute('required');
            } else {
                title.innerText = "Регистрация пилота";
                btn.innerText = "Создать профиль";
                switchTxt.innerText = "Войти в хаб";
                carGroup.style.display = "block";
                document.getElementById('car-model').setAttribute('required', 'required');
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const psn = document.getElementById('psn-id').value.trim();
            const car = document.getElementById('car-model').value.trim();

            try {
                if (isLoginMode) {
                    // Логика входа: ищем пилота в базе данных
                    const { data, error } = await supabase
                        .from('gt7_accounts')
                        .select('*')
                        .eq('psn_id', psn)
                        .single();

                    if (error || !data) {
                        alert("Пилот с таким PSN ID не найден. Проверь данные или пройди регистрацию!");
                        return;
                    }
                    loginSuccess(data);
                } else {
                    // Логика регистрации: отправляем нового пилота в базу
                    const { data, error } = await supabase
                        .from('gt7_accounts')
                        .insert([{ psn_id: psn, car_model: car }])
                        .select()
                        .single();

                    if (error) {
                        if (error.code === '23505') { // Проверка дубликата pkey
                            alert("Этот PSN ID уже зарегистрирован в базе! Используй форму Входа.");
                        } else {
                            throw error;
                        }
                        return;
                    }
                    alert("Профиль успешно создан и сохранен в облаке!");
                    loginSuccess(data);
                }
            } catch (err) {
                console.error("Ошибка авторизации:", err.message);
                alert("Ошибка соединения с базой: " + err.message);
            }
        }

        function loginSuccess(pilotData) {
            currentPilot = pilotData;
            sessionStorage.setItem('active_pilot', JSON.stringify(pilotData));
            updateUI();
        }

        function logout() {
            currentPilot = null;
            sessionStorage.removeItem('active_pilot');
            updateUI();
        }

        function updateUI() {
            const authPanel = document.getElementById('auth-panel');
            const profilePanel = document.getElementById('profile-panel');
            const lobbyPanel = document.getElementById('create-lobby-panel');

            if (currentPilot) {
                authPanel.style.display = "none";
                profilePanel.style.display = "block";
                lobbyPanel.style.display = "block";
                document.getElementById('profile-psn').innerText = currentPilot.psn_id;
                document.getElementById('profile-car').innerText = currentPilot.car_model || 'Машина не выбрана';
                document.getElementById('user-status').innerText = `Пилот: ${currentPilot.psn_id}`;
            } else {
                authPanel.style.display = "block";
                profilePanel.style.display = "none";
                lobbyPanel.style.display = "none";
                document.getElementById('user-status').innerText = "Ожидание авторизации";
                document.getElementById('auth-form').reset();
            }
        }


        // --- ЛОГИКА СЕТЕВЫХ ЛОББИ ---

        async function createLobby(event) {
            event.preventDefault();
            if (!currentPilot) {
                alert("Вы должны войти под своим профилем, чтобы открыть заезд!");
                return;
            }

            const track = document.getElementById('lobby-track').value;
            const car = document.getElementById('lobby-car').value.trim();
            const comment = document.getElementById('lobby-comment').value.trim();

            try {
                const { error } = await supabase
                    .from('gt7_lobbies')
                    .insert([{
                        psn_id: currentPilot.psn_id,
                        track_name: track,
                        car_model: car,
                        comment: comment
                    }]);

                if (error) throw error;

                document.getElementById('lobby-form').reset();
                alert("Гоночная сессия опубликована в глобальную ленту!");
                loadActiveLobbies(); // Моментально обновляем список
            } catch (err) {
                console.error("Ошибка при публикации сессии:", err.message);
                alert("Не удалось отправить лобби в сеть: " + err.message);
            }
        }

        // Автоматическая загрузка заездов с фильтром по времени (последние 6 часов)
        async function loadActiveLobbies() {
            try {
                const hoursLimit = 6;
                const timeCutoff = new Date(Date.now() - hoursLimit * 60 * 60 * 1000).toISOString();

                // Запрос в облако
                const { data: lobbies, error } = await supabase
                    .from('gt7_lobbies')
                    .select('*')
                    .gt('created_at', timeCutoff) // Только свежие заезды
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const lobbiesContainer = document.getElementById('lobbies-container');
                if (!lobbiesContainer) return;
                
                lobbiesContainer.innerHTML = ''; 

                // Заглушка, если трассы пусты
                if (!lobbies || lobbies.length === 0) {
                    lobbiesContainer.innerHTML = `
                        <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                            <p style="font-size: 24px; margin-bottom: 5px;">🚦</p>
                            <p style="margin: 0;">Сейчас в сети нет активных заездов.</p>
                            <small style="font-size: 11px; color: #555;">Создай лобби первым, чтобы открыть трек!</small>
                        </div>
                    `;
                    return;
                }

                // Рендеринг живых карточек лобби
                lobbies.forEach(lobby => {
                    const lobbyCard = document.createElement('div');
                    lobbyCard.className = 'lobby-card';
                    
                    const lobbyTime = new Date(lobby.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    lobbyCard.innerHTML = `
                        <div class="lobby-header">
                            <span class="track-name">📍 ${lobby.track_name}</span>
                            <span class="lobby-time">${lobbyTime}</span>
                        </div>
                        <div class="lobby-body">
                            <p><strong>Организатор:</strong> PSN: <span style="color: #00e5ff;">${lobby.psn_id}</span></p>
                            <p><strong>Регламент по авто:</strong> ${lobby.car_model}</p>
                            ${lobby.comment ? `<p class="lobby-comment">💬 ${lobby.comment}</p>` : ''}
                        </div>
                    `;
                    
                    lobbiesContainer.appendChild(lobbyCard);
                });

            } catch (err) {
                console.error('Ошибка синхронизации гоночной ленты:', err.message);
            }
        }


        // --- СТАРТ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ ---
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();           // Восстанавливаем сессию пилота, если она есть
            loadActiveLobbies();  // Скачиваем актуальную сетку лобби
            
            // Живой таймер: обновляем ленту каждые 60 секунд 
            setInterval(loadActiveLobbies, 60000);
        });
    </script>
</body>
</html>
