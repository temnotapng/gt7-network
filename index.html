<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT7 Network // Lobby Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --card-bg: rgba(19, 20, 25, 0.85);
            --accent-color: #ff3e3e;
            --text-main: #f5f5f7;
            --text-muted: #7e7e86;
            --border-color: rgba(36, 37, 45, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #050507;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* --- ЗАДНИЙ ПЛАН: ЖИВОЙ АНИМИРОВАННЫЙ СЛАЙДЕР --- */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background-color: #050507;
            pointer-events: none;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .track-bg {
            background-image: linear-gradient(rgba(10, 10, 12, 0.5), rgba(10, 10, 12, 0.8)), 
                              url('https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?q=80&w=1920'); 
            animation: fadeTrack 16s infinite ease-in-out;
        }

        .car-bg {
            background-image: linear-gradient(rgba(10, 10, 12, 0.4), rgba(10, 10, 12, 0.7)), 
                              url('https://images.unsplash.com/photo-1617814076367-b759c7d7e738?q=80&w=1920'); 
            animation: fadeCarAndFlash 16s infinite ease-in-out;
        }

        @keyframes fadeTrack {
            0%, 40% { opacity: 1; }      
            50%, 90% { opacity: 0.1; }   
            100% { opacity: 1; }         
        }

        @keyframes fadeCarAndFlash {
            0%, 40% { opacity: 0; filter: brightness(1) contrast(1); } 
            48% { opacity: 1; filter: brightness(1) contrast(1); }    
            
            52% { filter: brightness(1.8) contrast(1.4); } 
            54% { filter: brightness(1) contrast(1); }     
            56% { filter: brightness(1.8) contrast(1.4); } 
            58% { filter: brightness(1) contrast(1); }     
            
            80% { filter: brightness(1) contrast(1); }
            82% { filter: brightness(1.9) contrast(1.5); } 
            84% { filter: brightness(1) contrast(1); }
            
            92% { opacity: 1; }
            100% { opacity: 0; } 
        }

        /* --- СТИЛИ ИНТЕРФЕЙСА ХАБА --- */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .hub-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 900px) {
            .hub-container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(28, 29, 36, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #cc3232; }

        .driver-card {
            background: linear-gradient(135deg, rgba(26, 28, 35, 0.9) 0%, rgba(17, 18, 22, 0.9) 100%);
            border-left: 4px solid #00e5ff;
        }

        .driver-card .status {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0, 229, 255, 0.1);
            color: #00e5ff;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .lobbies-feed { display: flex; flex-direction: column; gap: 15px; }
        
        .lobby-card {
            background: rgba(30, 31, 38, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .lobby-card:hover {
            border-color: #555;
            transform: scale(1.01);
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .track-name { font-weight: bold; font-size: 16px; }
        .lobby-time { color: var(--accent-color); font-weight: bold; }
        .lobby-body p { margin: 6px 0; font-size: 14px; }
        
        .lobby-comment {
            background: rgba(10, 10, 12, 0.5);
            padding: 8px 12px;
            border-radius: 4px;
            font-style: italic;
            color: #aaa;
        }

        .switch-auth {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }
        .switch-auth span { color: var(--accent-color); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="bg-slide track-bg"></div>
        <div class="bg-slide car-bg"></div>
    </div>

    <header>
        <h1>GT7 Network // Lobby Hub</h1>
        <div id="user-status" style="font-size: 14px;">Ожидание авторизации</div>
    </header>

    <div class="hub-container">
        
        <div class="left-column" style="display: flex; flex-direction: column; gap: 25px;">
            
            <div id="auth-panel" class="panel">
                <h2 id="auth-title">Регистрация пилота</h2>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label for="psn-id">PSN ID</label>
                        <input type="text" id="psn-id" placeholder="Например: PRO_DRIVER" required>
                    </div>
                    <div class="form-group" id="car-group">
                        <label for="car-model">Основной болид</label>
                        <input type="text" id="car-model" placeholder="Porsche 911 GT3 R (992)" required>
                    </div>
                    <div class="form-group">
                        <label for="pilot-password">Пароль пилота</label>
                        <input type="password" id="pilot-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="auth-btn">Создать профиль</button>
                </form>
                <div class="switch-auth" onclick="toggleAuthMode()">
                    Уже есть профиль? <span id="switch-text">Войти в хаб</span>
                </div>
            </div>

            <div id="profile-panel" class="panel driver-card" style="display: none;">
                <h2>Текущий пилот</h2>
                <div class="status">В Сети</div>
                <p style="margin: 15px 0 5px 0; font-size: 18px; font-weight: bold;" id="profile-psn"></p>
                <p style="margin: 0; font-size: 14px; color: #aaa;" id="profile-car"></p>
                <button onclick="logout()" style="margin-top: 20px; background: #24252d; font-size: 12px; padding: 8px;">Выйти из хаба</button>
            </div>

            <div id="create-lobby-panel" class="panel" style="display: none;">
                <h2>Открыть заезд</h2>
                <form id="lobby-form" onsubmit="createLobby(event)">
                    <div class="form-group">
                        <label for="lobby-track">Трасса заезда</label>
                        <select id="lobby-track">
                            <option value="Nürburgring Nordschleife">Nürburgring Nordschleife</option>
                            <option value="Spa-Francorchamps">Spa-Francorchamps</option>
                            <option value="Sarthe (Le Mans)">Circuit de la Sarthe</option>
                            <option value="Suzuka Circuit">Suzuka Circuit</option>
                            <option value="Tsukuba">Tsukuba Circuit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="lobby-car">Ограничения по авто / Класс</label>
                        <input type="text" id="lobby-car" placeholder="Gr.3 / Свободный выбор" required>
                    </div>
                    <div class="form-group">
                        <label for="lobby-comment">Комментарий к лобби</label>
                        <textarea id="lobby-comment" rows="3" placeholder="Чистая гонка, старт в 21:00..."></textarea>
                    </div>
                    <button type="submit">Опубликовать в сеть</button>
                </form>
            </div>

        </div>

        <div class="right-column panel">
            <h2>Текущие лобби в сети (Активны 6 часов)</h2>
            <div id="lobbies-container" class="lobbies-feed"></div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://fbcnnieqieyzsfipckl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_8IgPV_lCbhc2E2s07k-NfQ_7oMEoHIC';
        
        let supabase;
        if (typeof window.supabaseInstance === 'undefined') {
            window.supabaseInstance = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        supabase = window.supabaseInstance;

        let currentPilot = JSON.parse(sessionStorage.getItem('gt7_logged_pilot')) || null;
        let isLoginMode = false; 

        // СИНТЕЗАТОР ГОНОЧНЫХ SFX
        function playGTClick() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const playNode = (freq, start, duration, vol) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, start);
                    gain.gain.setValueAtTime(vol, start); gain.gain.exponentialRampToValueAtTime(0.00001, start + duration);
                    osc.connect(gain); gain.connect(ctx.destination); osc.start(start); osc.stop(start + duration);
                };
                playNode(1550, now, 0.04, 0.03); playNode(1950, now + 0.02, 0.03, 0.02);
            } catch(e) {}
        }

        function toggleAuthMode() {
            playGTClick();
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const switchTxt = document.getElementById('switch-text');
            const carGroup = document.getElementById('car-group');

            document.getElementById('auth-form').reset();

            if (isLoginMode) {
                title.innerText = "Вход в хаб";
                btn.innerText = "Авторизоваться";
                switchTxt.innerText = "Создать профиль";
                carGroup.style.display = "none";
                document.getElementById('car-model').removeAttribute('required');
            } else {
                title.innerText = "Регистрация пилота";
                btn.innerText = "Создать профиль";
                switchTxt.innerText = "Войти в хаб";
                carGroup.style.display = "block";
                document.getElementById('car-model').setAttribute('required', 'required');
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            playGTClick();
            const psn = document.getElementById('psn-id').value.trim();
            const car = document.getElementById('car-model').value.trim();
            const password = document.getElementById('pilot-password').value.trim();

            try {
                if (isLoginMode) {
                    // Проверка и по PSN ID, и по ПАРОЛЮ
                    const { data, error } = await supabase
                        .from('gt7_accounts')
                        .select('*')
                        .eq('psn_id', psn)
                        .eq('password', password)
                        .single();

                    if (error || !data) {
                        alert("Неверный PSN ID или пароль пилота!");
                        return;
                    }
                    loginSuccess(data);
                } else {
                    // Сохранение профиля вместе с паролем в колонку password
                    const { data, error } = await supabase
                        .from('gt7_accounts')
                        .insert([{ psn_id: psn, car_model: car, password: password }])
                        .select()
                        .single();

                    if (error) {
                        if (error.code === '23505') {
                            alert("Этот PSN ID уже занят! Выберите вход в систему.");
                        } else { throw error; }
                        return;
                    }
                    alert("Профиль успешно защищен паролем и сохранен!");
                    loginSuccess(data);
                }
            } catch (err) {
                console.error("Ошибка базы:", err.message);
                alert("Ошибка подключения: " + err.message);
            }
        }

        function loginSuccess(pilotData) {
            currentPilot = pilotData;
            sessionStorage.setItem('gt7_logged_pilot', JSON.stringify(pilotData));
            updateUI();
        }

        function logout() {
            playGTClick();
            currentPilot = null;
            sessionStorage.removeItem('gt7_logged_pilot');
            updateUI();
        }

        function updateUI() {
            const authPanel = document.getElementById('auth-panel');
            const profilePanel = document.getElementById('profile-panel');
            const lobbyPanel = document.getElementById('create-lobby-panel');

            if (currentPilot) {
                authPanel.style.display = "none";
                profilePanel.style.display = "block";
                lobbyPanel.style.display = "block";
                document.getElementById('profile-psn').innerText = currentPilot.psn_id;
                document.getElementById('profile-car').innerText = currentPilot.car_model || 'Машина не выбрана';
                document.getElementById('user-status').innerText = `Пилот: ${currentPilot.psn_id}`;
            } else {
                authPanel.style.display = "block";
                profilePanel.style.display = "none";
                lobbyPanel.style.display = "none";
                document.getElementById('user-status').innerText = "Ожидание авторизации";
                document.getElementById('auth-form').reset();
            }
        }

        async function createLobby(event) {
            event.preventDefault();
            playGTClick();
            if (!currentPilot) return;

            const track = document.getElementById('lobby-track').value;
            const car = document.getElementById('lobby-car').value.trim();
            const comment = document.getElementById('lobby-comment').value.trim();

            try {
                const { error } = await supabase
                    .from('gt7_lobbies')
                    .insert([{
                        psn_id: currentPilot.psn_id,
                        track_name: track,
                        car_model: car,
                        comment: comment
                    }]);

                if (error) throw error;
                document.getElementById('lobby-form').reset();
                loadActiveLobbies();
            } catch (err) {
                alert("Ошибка публикации: " + err.message);
            }
        }

        async function loadActiveLobbies() {
            try {
                const hoursLimit = 6;
                const timeCutoff = new Date(Date.now() - hoursLimit * 60 * 60 * 1000).toISOString();

                const { data: lobbies, error } = await supabase
                    .from('gt7_lobbies')
                    .select('*')
                    .gt('created_at', timeCutoff)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const lobbiesContainer = document.getElementById('lobbies-container');
                if (!lobbiesContainer) return;
                lobbiesContainer.innerHTML = ''; 

                if (!lobbies || lobbies.length === 0) {
                    lobbiesContainer.innerHTML = `
                        <div style="text-align: center; color: #666; padding: 40px 20px;">
                            <p style="font-size: 24px; margin-bottom: 5px;">🚦</p>
                            <p style="margin: 0;">Сейчас в сети нет активных заездов.</p>
                        </div>
                    `;
                    return;
                }

                lobbies.forEach(lobby => {
                    const lobbyCard = document.createElement('div');
                    lobbyCard.className = 'lobby-card';
                    const lobbyTime = new Date(lobby.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    lobbyCard.innerHTML = `
                        <div class="lobby-header">
                            <span class="track-name">📍 ${lobby.track_name}</span>
                            <span class="lobby-time">${lobbyTime}</span>
                        </div>
                        <div class="lobby-body">
                            <p><strong>Организатор:</strong> PSN: <span style="color: #00e5ff;">${lobby.psn_id}</span></p>
                            <p><strong>Регламент по авто:</strong> ${lobby.car_model}</p>
                            ${lobby.comment ? `<p class="lobby-comment">💬 ${lobby.comment}</p>` : ''}
                        </div>
                    `;
                    lobbiesContainer.appendChild(lobbyCard);
                });
            } catch (err) {
                console.error('Ошибка ленты лобби:', err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            loadActiveLobbies();
            setInterval(loadActiveLobbies, 60000);
        });
    </script>
</body>
</html>
